<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin – Exclusiones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <!-- Fluent UI MDL2 (íconos oficiales Microsoft) -->
  <link rel="stylesheet" href="https://res.cdn.office.net/files/fabric-cdn-prod_20240201.001/assets/icons/fabric-icons.css" />
  <style>
    :root{
      /* ====== CONTROLES RÁPIDOS ====== */
      --sidebar-w: 290px;
      --page-gap: 4px;
      --logo-size: 54px;
      --glass-blur: 18px;
      --content-max: 1220px;
      /* ====== Tokens visuales ====== */
      --radius-xxl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --ink:#0e2040;
      --muted:#6b7893;
      /* Sombra y glass */
      --halo: 0 30px 60px rgba(14, 42, 94, .18), 0 10px 20px rgba(14, 42, 94, .08);
      --glass: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.58));
      --glass-border: 1px solid rgba(180, 200, 235, .55);
      --glass-inner: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.72));
      --glass-inner-border: 1px solid rgba(200, 215, 245, .75);
      /* ====== Tokens para 3D en elementos (sin paneles blancos) ====== */
      --elev-1: 0 4px 10px rgba(14,42,94,.10), 0 2px 6px rgba(14,42,94,.08);
      --elev-2: 0 12px 24px rgba(14,42,94,.14), 0 6px 12px rgba(14,42,94,.10);
      --elev-3: 0 22px 40px rgba(14,42,94,.16), 0 10px 18px rgba(14,42,94,.12);
      --tilt: perspective(900px) rotateX(0.6deg);
    }
    *{ box-sizing: border-box }
    html,body{ height:100% }
    body{
      margin:0;
      font-family:"Segoe UI", system-ui, Roboto, Arial, sans-serif;
      color:#1a2333;
      background:
        radial-gradient(1200px 600px at 80% -10%, #eaf1ff 0%, rgba(234,241,255,0) 60%),
        linear-gradient(180deg, #eef4ff, #ffffff);
      display:flex;
      min-height:100vh;
      overflow-x:hidden;
    }
    /* ===== Sidebar ===== */
    .sidebar-wrap{ width: var(--sidebar-w); padding: var(--page-gap) 14px; flex: 0 0 var(--sidebar-w); }
    .sidebar{
      position: sticky; top: var(--page-gap);
      display:flex; flex-direction:column; gap:14px; padding:16px 14px;
      border-radius: var(--radius-xxl);
      background: var(--glass); border: var(--glass-border); box-shadow: var(--halo);
      backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
      min-height: calc(100vh - (2 * var(--page-gap)));
      max-height: calc(100vh - (2 * var(--page-gap)));
      overflow: hidden; align-items: stretch;
    }
    .sidebar__scroll{ display:flex; flex-direction:column; gap:14px; min-height: 0; overflow: auto; padding-bottom: 6px; }
    /* Brand */
    .brand{
      display:flex; align-items:center; gap:12px;
      padding:12px; border-radius: var(--radius-lg);
      background: var(--glass-inner); border: var(--glass-inner-border);
      box-shadow: 0 8px 18px rgba(30, 60, 120, .10);
    }
    .brand-logo{ width:var(--logo-size); height:var(--logo-size); display:grid; place-items:center; }
    .brand-logo img{ width:100%; height:100%; display:block; object-fit:contain; image-rendering:auto; }
    .brand-logo.has-img .fallback-letter{ display:none; }
    .fallback-letter{ font-weight:800; font-size: calc(var(--logo-size)*0.5); }
    .brand-txt{ line-height:1.15 }
    .brand-title{ font-weight:800; color:#0e2040 }
    .brand-sub{ font-size:12px; color:#6b7893 }
    .nav-title{
      font-size:12px;
      letter-spacing:.4px;
      color:#3b455a;
      text-transform:uppercase;
      margin:2px 0 2px 6px;
      font-weight:700;
    }
    /* Botonera de tareas en sidebar */
    .side-actions{ display:flex; flex-direction:column; gap:10px; padding:4px; }
    .side-actions .btn{
      width:100%;
      justify-content:flex-start;
      gap:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(210,225,250,.9);
      box-shadow:0 6px 16px rgba(20, 40, 90, .08);
      background:#fff;
      color:#213159;
      transition:0.15s ease;
    }
    /* >>> RESALTADO AZUL AL PASAR / CLIC (solo sidebar) <<< */
    .side-actions .btn:hover,
    .side-actions .btn:focus,
    .side-actions .btn:active{
      background:#d8e6ff !important;
      border-color:#0e4aa8 !important;
      color:#0e4aa8 !important;
      box-shadow:0 0 0 3px rgba(14,74,168,0.15);
    }
    /* Tamaño para los SVG de marca (Outlook/Teams) en sidebar */
    .side-actions .brand-ico{
      width:18px; height:18px; display:inline-block; flex:0 0 auto;
      vertical-align:middle;
      fill:currentColor;
    }
    .btn-outlook{ background:#e8eef7; color:#0a5bd3; border-color:#cfe0ff; }
    .btn-teams{ background:#464EB8; color:#fff; border-color:#464EB8; }
    .btn .ms-Icon{ font-size:18px; line-height:1; }
    /* Footer chips */
    .side-foot{ margin-top:auto; display:flex; flex-direction:column; gap:10px; }
    .chip{
      display:flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:12px;
      background:#ffffff; border:1px solid rgba(210,225,250,.9);
      color:#213159;
      box-shadow: 0 6px 16px rgba(20, 40, 90, .08);
    }
    .side-foot .chip:hover,
    .side-foot .chip:focus,
    .side-foot .chip:active{
      background:#d8e6ff !important;
      border-color:#0e4aa8 !important;
      color:#0e4aa8 !important;
      box-shadow:0 0 0 3px rgba(14,74,168,0.15);
    }
    .chip .ico{ width:18px; height:18px; }
    /* ===== Main / Container ===== */
    .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
    .container{ width:100%; max-width: var(--content-max); margin-inline:auto; padding-inline: clamp(16px, 2vw, 24px); }
    /* ===== Hero ===== */
    .hero{ padding:18px 0 10px; border-bottom:1px solid rgba(199,215,243,.55); background:rgba(255,255,255,.68); backdrop-filter: blur(8px); }
    .breadcrumb { font-weight:700; padding-top: 2px; }
    .title{ font-size:28px; font-weight:800; color:#0e2040; margin:6px 0 4px; }
    .subtitle{ color:#4e5d78; }
    /* ===== LOG GLOBAL ===== */
    .global-log-wrap{
      display: inline-grid;
      grid-auto-flow: column;
      align-items: center;
      gap: 10px;
    }
    .global-log-label{
      font-weight: 700;
      font-size: 14px;
      line-height: 28px;
      color: #1a2333;
      letter-spacing: .2px;
      margin: 0;
    }
    .global-log{
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 10px;
      font-size:12px; color:#0e3a82;
      background:#eef3ff; border:1px solid #dbe6ff;
      max-width: min(100%, 760px);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    /* Banda del log: sin fondo y un poco más abajo */
    .log-band{
      background: transparent;
      border: none;
      padding: 0;
      margin-top: 14px;
      margin-bottom: 10px;
    }
    /* ===== Tiles ===== */
    .tiles{
      padding-block:16px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap:14px;
    }
    .tile{
      position: relative;
      border-radius:var(--radius-lg);
      background:#fff; border:1px solid rgba(199,215,243,.7);
      box-shadow: var(--elev-1), 0 1px 0 rgba(255,255,255,.85) inset;
      filter: drop-shadow(0 14px 28px rgba(14,42,94,.18));
      padding:14px; display:flex; gap:12px; align-items:center; cursor:pointer;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      min-width:0;
      transform: var(--tilt);
    }
    .tile:hover{
      transform: translateY(-3px) var(--tilt);
      box-shadow: var(--elev-2), 0 1px 0 rgba(255,255,255,.9) inset;
      filter: drop-shadow(0 22px 36px rgba(14,42,94,.22));
    }
    .tile:active{
      transform: translateY(-1px) var(--tilt);
      box-shadow: var(--elev-1);
      filter: drop-shadow(0 16px 28px rgba(14,42,94,.20));
    }
    .tile .ico{ width:44px; height:44px; border-radius:12px; display:grid; place-items:center; color:#fff; flex:0 0 auto; }
    .ico-blue{ background:#0e4aa8; box-shadow:0 6px 16px rgba(14,74,168,.35); }
    .ico-amber{ background:#f59e0b; box-shadow:0 6px 16px rgba(245,158,11,.35); }
    .ico-sky{ background:#0284c7; box-shadow:0 6px 16px rgba(2,132,199,.35); }
    .tile .t-wrap{ flex:1; min-width:0; }
    .tile .t-title{ font-size:16px; font-weight:800; color:#0e2040; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tile .t-sub{ font-size:12px; color:#6b7893; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tile.soon{ opacity:.95; filter: drop-shadow(0 14px 28px rgba(14,42,94,.14)); }
    /* Chip común */
    .tile .badge{
      margin-left:auto; font-size:11px; font-weight:700; color:#0e3a82;
      background:#eef3ff; padding:4px 8px; border-radius:999px; border:1px solid #dbe6ff;
    }
    /* >>> Chip "Activo" en VERDE solo para Operatividad <<< */
    .tiles [data-key="operatividad"] .badge{
      background:#e8f7ec;
      border-color:#b7ebc0;
      color:#107c10;
    }
    /* ===== Tooltip sutil en tiles ===== */
    .tile[data-tooltip]::after{
      content: attr(data-tooltip);
      position: absolute;
      top: -8px;
      right: 14px;
      transform: translateY(-100%);
      background: rgba(14, 32, 64, 0.92);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,.20);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
      white-space: nowrap;
      z-index: 2;
    }
    .tile[data-tooltip]::before{
      content: "";
      position: absolute;
      top: -8px;
      right: 26px;
      transform: translateY(-100%);
      border: 6px solid transparent;
      border-top-color: rgba(14, 32, 64, 0.92);
      opacity: 0;
      transition: opacity .15s ease;
      z-index: 2;
    }
    .tile[data-tooltip]:hover::after,
    .tile[data-tooltip]:hover::before{
      opacity: 1;
    }
    /* ===== Acciones ===== */
    .actions{
      padding-block: 4px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap:14px;
      align-items:start;
    }
    .btn{
      display:inline-flex; align-items:center; gap:10px;
      padding:9px 7px; border-radius:999px; border:1px solid rgba(210,225,250,.9);
      cursor:pointer; font-weight:600; background:#fff; color:#0e3a82;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      filter: drop-shadow(0 12px 22px rgba(14,42,94,.16));
      transition: transform .08s ease, box-shadow .12s ease, filter .12s ease, background .12s ease, color .12s ease;
    }
    .btn:hover{ transform: translateY(-2px); box-shadow:0 10px 20px rgba(0,0,0,.10); filter: drop-shadow(0 20px 30px rgba(14,42,94,.20)); }
    .btn:active{ transform: translateY(-1px); box-shadow:0 6px 12px rgba(0,0,0,.10) inset, 0 2px 4px rgba(0,0,0,.06); filter: drop-shadow(0 16px 24px rgba(14,42,94,.18)); }
    .btn svg{ width:18px; height:18px; flex:0 0 auto; }
    .btn .ms-Icon{ font-size:18px; line-height:1; }
    .btn-imp{ background:#0e4aa8; color:#fff; border-color:#0e4aa8; }
    .btn-exp{ background:#e8eef7; color:#0e4aa8; border-color:#cfe0ff; }
    .btn[disabled]{ opacity:.6; cursor:not-allowed; box-shadow:none; filter:none; }
    .actions .pair{ display:flex; gap:10px; flex-wrap:nowrap; align-items:center; }
    .actions .btn{ padding:6px 10px; font-size:13px; justify-content:center; line-height:1.1; }
    .actions .btn svg{ width:16px; height:16px; }
    .actions .btn .lbl{ line-height:1.1; text-align:center; }
    /* ======= AYUDA / HELP ======= */
    .help{
      display:none; /* se muestra al click */
      margin-top: 14px;
      margin-bottom: 6px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid rgba(199,215,243,.70);
      box-shadow: var(--elev-2);
      filter: drop-shadow(0 18px 32px rgba(14,42,94,.18));
      width: fit-content;
      max-width: min(100%, 860px);
      min-width: 340px;
    }
    .help h3 { font-size:14px !important; }
    .help p { font-size:12px !important; }
    .help ul { font-size:12px !important; }
    .help li { font-size:12px !important; }
    .help .help-close { font-size:11px !important; padding:4px 8px !important; }
    .help-head{ display:flex; align-items:center; gap:12px; margin-bottom:6px; }
    .help h3{ margin: 0; font-weight: 800; color:#0e2040; flex:1; }
    .help p{ margin: 0 0 8px; color:#4e5d78; }
    .help ul{ margin: 6px 0 0 18px; padding:0; color:#22314a; }
    .help li{ margin: 4px 0; }
    .help .help-close{
      appearance:none; border:1px solid #cfe0ff; background:#eef3ff;
      color:#0e3a82; border-radius:999px; cursor:pointer; box-shadow:0 6px 14px rgba(14,42,94,.16);
    }
    .help .help-close:hover{ transform: translateY(-1px); box-shadow:0 10px 18px rgba(14,42,94,.22); }
    .help .help-close:active{ transform: translateY(0); box-shadow:0 6px 12px rgba(14,42,94,.16) inset; }
    /* >>> Ajuste específico para Desktop (más compacto) <<< */
    @media (min-width: 1024px){ .help{ max-width: 640px; } }
    @media (max-width: 640px){ .help{ min-width: 0; width: 100%; max-width: 100%; } }
    /* ===== Estado/alertas ===== */
    .state{ margin: 8px 0 14px; padding:10px 12px; border-radius:12px; display:none; border:1px solid #dbe6ff; background:#eef3ff; color:#0e3a82; }
    .state.error{ border-color:#fecaca; background:#fee2e2; color:#991b1b; }
    /* ===== Modal de confirmación (con fondo difuminado) ===== */
    .modal-backdrop{
      position:fixed; inset:0;
      background: rgba(15,23,42,.28); /* tenue */
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); /* << difumina el resto */
      display:none; align-items:center; justify-content:center;
    }
    .modal{
      background:#fff; padding:16px; border-radius:16px;
      width: min(92%, 420px);
      box-shadow: 0 18px 38px rgba(14,42,94,.25);
    }
    .modal h3{ margin:0 0 6px; color:#0e2040; font-weight:800; font-size:16px; }
    .modal p { margin:6px 0 0; color:#4e5d78; font-size:13px; }
    .modal .actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }
    .modal .btn{ padding:7px 12px; font-size:13px; border-radius:999px; }
    .modal .btn-si{ background:#0e4aa8; color:#fff; border-color:#0e4aa8; }
    .modal .btn-no{ background:#e8eef7; color:#0e3a82; border-color:#cfe0ff; }
    /* ===== Ajustes ===== */
    .tiles.container{ margin-top: 60px; }
    .container:last-of-type{ padding-bottom: 0 !important; }
    @media (min-width: 1440px){
      :root{ --content-max: 1280px; }
      .container{ margin-left: clamp(16px, 2vw, 32px); margin-right: auto; padding-inline: clamp(16px, 1.6vw, 24px); }
      .hero{ padding:14px 0 8px; }
      .tiles{ padding-block:14px; gap:12px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    }
    /* ===== Móvil ===== */
    @media (max-width: 980px){
      body{ flex-direction:column; }
      .sidebar-wrap{ width:100%; padding:12px 10px 0; }
      .sidebar{ position:relative; top:auto; min-height:auto; max-height:none; }
      .tiles{ padding-block:12px; }
    }
    /* ====== Modo oscuro ====== */
    .dark body{
      background:
        radial-gradient(1200px 600px at 80% -10%, #0f1a2b 0%, rgba(15,26,43,0) 60%),
        linear-gradient(180deg, #0f172a, #111827);
      color:#e5e7eb;
    }
    .dark .help{
      background: #0f1a2b; border-color:#22314a;
      box-shadow: 0 12px 24px rgba(0,0,0,.45);
      filter: drop-shadow(0 18px 32px rgba(0,0,0,.55));
    }
    .dark .help h3{ color:#eaf2ff; }
    .dark .help p{ color:#c7d2fe; }
    .dark .help ul{ color:#dbeafe; }
    .dark .help .help-close{
      background:#1e2a40; border-color:#2a4266; color:#cfe1ff;
      box-shadow:0 10px 18px rgba(0,0,0,.45);
    }
    /* Sidebar y brand */
    .dark .sidebar{ background: linear-gradient(180deg, rgba(30,41,59,.65), rgba(30,41,59,.55)); border-color: rgba(148,163,184,.35); }
    .dark .brand{ background:#0f1a2b; border-color:#243248; color:#eaf2ff; }
    .dark #brandLogo{ background:#ffffff; border-radius:12px; padding:6px; }
    .dark .brand-title{ color:#eaf2ff; }
    .dark .brand-sub{ color:#a7b4c9; }
    .dark .nav-title{ color:#c7d2fe; }
    /* Hero */
    .dark .hero{ background: rgba(15,23,42,.66); border-bottom-color: rgba(148,163,184,.32); }
    .dark .breadcrumb{ color:#dbe4ff; }
    .dark .title{ color:#eaf2ff; }
    .dark .subtitle{ color:#c7d2fe; }
    /* Log global */
    .dark .global-log-wrap .global-log-label{ color:#eaf2ff; }
    .dark .global-log{ background:#102646; border-color:#345e9e; color:#dbeafe; }
    /* Tiles (módulos) */
    .dark .tile{ background:#0f1a2b; border-color:#22314a; color:#eaf2ff;
      box-shadow: 0 2px 6px rgba(0,0,0,.45), 0 14px 26px rgba(0,0,0,.40);
      filter: drop-shadow(0 16px 28px rgba(0,0,0,.45)); }
    .dark .tile:hover{ filter: drop-shadow(0 24px 36px rgba(0,0,0,.55)); }
    .dark .tile .t-title{ color:#eaf2ff; }
    .dark .tile .t-sub{ color:#c7d2fe; }
    .dark .tile.soon{ opacity:.95; filter: drop-shadow(0 16px 28px rgba(0,0,0,.40)); }
    /* Badges */
    .dark .tile .badge{ background:#0b1b33; border-color:#274060; color:#a8c3ff; }
    .dark .tiles [data-key="operatividad"] .badge{ background:#143924; border-color:#2a6d41; color:#95f0a8; }
    /* Botones acciones */
    .dark .btn{ background:#0f1b30; color:#cfe1ff; border-color:#2a4266; box-shadow: 0 10px 22px rgba(0,0,0,.35); filter: drop-shadow(0 14px 24px rgba(0,0,0,.45)); }
    .dark .btn:hover{ filter: drop-shadow(0 22px 34px rgba(0,0,0,.58)); }
    .dark .btn-imp{ background:#0e4aa8; color:#fff; border-color:#0e4aa8; }
    .dark .btn-exp{ background:#1e2a40; color:#cfe1ff; border-color:#2a4266; }
    .dark .btn[disabled]{ opacity:1; background:#0e1626; color:#7f92b6; border-color:#1f2f48; cursor:not-allowed; box-shadow:none; filter:none; }
    /* Estado/alertas */
    .dark .state{ background:#0b1b33; border-color:#274060; color:#cfe1ff; }
    .dark .state.error{ background:#3b0f13; border-color:#7f1d1d; color:#fecaca; }
    /* Modal dark */
    .dark .modal-backdrop{ background: rgba(0,0,0,.35); backdrop-filter: blur(8px); }
    .dark .modal{ background:#0f1a2b; box-shadow: 0 18px 38px rgba(0,0,0,.5); }
    .dark .modal h3{ color:#eaf2ff; }
    .dark .modal p{ color:#c7d2fe; }
    .dark .modal .btn-no{ background:#1e2a40; color:#cfe1ff; border-color:#2a4266; }
    /* Movimientos reducidos */
    @media (prefers-reduced-motion: reduce){
      .tile, .actions .btn, .help, .modal { transition: none !important; transform: none !important; filter: none !important; }
      .tile:hover, .tile:active, .actions .btn:hover, .actions .btn:active { transform: none !important; }
    }
    /* ======= Realce de tarjeta activa al importar/exportar ======= */
    .tile[aria-pressed="true"] {
      outline: 2px solid rgba(14,74,168,.25);
      outline-offset: 2px;
    }
    .tile.active-glow {
      box-shadow:
        0 0 0 3px rgba(14,74,168,.18),
        0 10px 24px rgba(14,42,94,.25),
        0 1px 0 rgba(255,255,255,.90) inset;
      transform: translateY(-4px) var(--tilt);
      transition: box-shadow .18s ease, transform .18s ease;
    }
    @keyframes tile-pulse {
      0% { box-shadow: 0 0 0 0 rgba(14,74,168,.28); }
      70% { box-shadow: 0 0 0 10px rgba(14,74,168,0); }
      100% { box-shadow: 0 0 0 0 rgba(14,74,168,0); }
    }
    .tile.pulse-ring { animation: tile-pulse 1.1s ease-out 2; }
    /* ======== MODO SOLO IA (lienzo con header visible) ======== */
    .only-ai .log-band,
    .only-ai #tiles,
    .only-ai .actions,
    .only-ai #helpPanel,
    .only-ai #estado { display: none !important; }
    /* Lienzo principal en modo IA */
    .only-ai #ai-canvas{
      flex: 1 1 auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: clamp(10px, 2vw, 16px);
      margin: 0 !important;
    }
    .only-ai #ai-inner{ width: min(820px, 100%); margin: 0 !important; }
    .only-ai #asistente-exclusiones-container{ margin: 0 !important; }
    .only-ai .container:last-of-type{ padding-bottom: 0 !important; }
    .only-ai #ai-canvas{ padding-top: clamp(8px, 1.8vw, 16px); padding-bottom: clamp(8px, 1.8vw, 16px); }
    .only-ai .hero + .log-band{ margin-top: 8px; }

    /* --- FIX: reactivar botones del modal en modo only-ai --- */

    /* ===== CSV utils ===== */
    function parseCSV(text, sep=';'){
      const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
        .split('\n').filter(l=>l.trim().length>0);
      const rows = [];
      for(const line of lines){
        const out=[]; let cur='', q=false;
        for(let i=0;i<line.length;i++){
          const ch=line[i];
          if(ch === '"'){ if(q && line[i+1]==='"'){cur+='"';i++;} else q=!q; }
          else if(ch===sep && !q){ out.push(cur); cur=''; }
          else cur+=ch;
        }
        out.push(cur); rows.push(out);
      }
      return rows;
    }
    function toCSV(rows, sep=';'){
      const esc=(v)=>{ v=(v??'').toString(); return /[;"\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
      return rows.map(r=>r.map(esc).join(sep)).join('\n');
    }
    function pick(headers, name, pos1){
      const i = headers.findIndex(h => (h??'').toString().trim().toLowerCase() === name.toLowerCase());
      return i !== -1 ? i : Math.max(0, Math.min(headers.length-1, pos1-1));
    }

    /* ===== Config Backend ===== */

    /* ===== POST to módulo ===== */
    async function postAoaTo(modKey, aoa){
      const API = BACKENDS[modKey];
      const res = await fetch(`${API}/api/sobrescribir`,{
        method:'POST',
        headers:{
          'Authorization':'Bearer '+ADMIN_TOKEN,
          'Content-Type':'application/json'
        },
        body:JSON.stringify({aoa})
      });
      const j = await res.json().catch(()=>null);
      if(!res.ok || !j?.ok) throw new Error(j?.error || `HTTP ${res.status}`);
      return true;
    }

    /* ===== Vaciar seguro ===== */
    const EXPORT_ENDPOINT = '/api/exportar';
    async function inferHeaders(mod){
      try{
        const api = BACKENDS[mod]; if(!api) throw new Error('Módulo desconocido');
        const res = await fetch(`${api}${EXPORT_ENDPOINT}`, { method:'GET' });
        const ct = (res.headers.get('content-type')||'').toLowerCase();
        if(!res.ok){ console.warn('inferHeaders: HTTP', res.status); return ['id']; }
        if(ct.includes('application/json')){
          const j = await res.json();
          if (Array.isArray(j.aoa) && Array.isArray(j.aoa[0])) return (j.aoa[0]||[]).map(v=> (v??'').toString()) || ['id'];
          if (typeof j.csv === 'string'){
            const lines = j.csv.split(/\r?\n/).filter(Boolean);
            return (lines[0] ? parseCSV(lines[0], ';') : ['id']);
          }
          if (Array.isArray(j.data) && j.data.length>0) return Object.keys(j.data[0]);
          return ['id'];
        }
        const text = await res.text();
        const firstLine = (text.split(/\r?\n/).find(l=>l.trim().length) || '');
        const hdr = parseCSV(firstLine, ';');
        return (hdr && hdr.length) ? hdr : ['id'];
      }catch(err){
        console.warn('inferHeaders error:', err);
        return ['id'];
      }
    }
    async function clearModule(mod){
      const headers = await inferHeaders(mod);
      const aoa = [ headers ];
      await postAoaTo(mod, aoa);
    }

    /* ====== EXPORT helpers (botones ocultos) ====== */

      const defs = [
        { id:'btnExportar',        mod:'operatividad' },
        { id:'btnExportar_backlog',mod:'backlog' },
        { id:'btnExportar_sla',    mod:'sla' },
      ];
      for(const d of defs){

    async function exportViaAPI(mod){
      try{
        const api = BACKENDS[mod]; if(!api) throw new Error('Módulo desconocido');
        const endpoints = [ EXPORT_ENDPOINT, '/api/exportar', '/api/ultimos', '/export' ];
        let res=null, used=null;
        for(const ep of endpoints){
          try{
            const r = await fetch(`${api}${ep}`, { method:'GET' });
            if(r.ok){ res=r; used=ep; break; }
            if(r.status === 404) continue;
            res=r; used=ep; break;
          }catch(_e){ continue; }
        }
        if(!res) throw new Error('No hubo respuesta del backend.');
        if(!res.ok) throw new Error(`HTTP ${res.status} (${used})`);
        const ct = (res.headers.get('content-type')||'').toLowerCase();
        let csvText = null;
        if(ct.includes('application/json')){
          const j = await res.json();
          if(Array.isArray(j.aoa)) csvText = toCSV(j.aoa,';');
          else if(typeof j.csv === 'string') csvText = j.csv;
          else if(Array.isArray(j.data)){
            const keys = Object.keys(j.data[0]||{});
            const rows = [keys, ...j.data.map(o => keys.map(k => o?.[k] ?? ''))];
            csvText = toCSV(rows,';');
          }else{
            throw new Error(`Respuesta de exportación no reconocida (${used})`);
          }
        }else{
          csvText = await res.text();
        }
        const blob = new Blob([csvText], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const now = new Date(); const pad = n => String(n).padStart(2,'0');
        const fname= `export_${mod}_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.csv`;
        a.href = url; a.download = fname; a.click();
        URL.revokeObjectURL(url);
        say(`Exportado ${mod.toUpperCase()} correctamente (via ${used}).`);
        log(`Exportación OK (${used}): ${fname}`);
      }catch(err){
        console.error(err);
        say('No se pudo exportar: ' + err.message);
        log('Export error: ' + err.message);
      }
    }

    /* ====== Vaciar con selección ====== */

    /* ===== Estados CSV ===== */
    let file = null;
    let outText = null;
    let resultAOA = null;

    /* ===============================
       KPI HELPERS (nuevo)
       =============================== */
    let kpiChartInstance = null;

    function ensureKpiCard(show=true){
      const card = $('#kpi-card');
      if(!card) return null;
      card.style.display = show ? 'block' : 'none';
      return card;
    }
    function randomPalette(n){
      const base = ['#0e4aa8','#2dd4bf','#f59e0b','#ef4444','#8b5cf6','#10b981','#3b82f6','#f97316','#22c55e','#eab308','#06b6d4','#a855f7','#84cc16'];
      const arr = []; for(let i=0;i<n;i++) arr.push(base[i%base.length]);
      return arr;
    }
    function pickKpiDim(aoa){
      const headers = aoa[0]||[];
      const rows = aoa.slice(1);
      let bestIdx = 0, bestCard = -1;
      for(let j=0;j<headers.length;j++){
        const vals = new Map();
        for(const r of rows){ const v=(r[j]??'').toString().trim(); if(!v) continue; vals.set(v,(vals.get(v)||0)+1); }
        const uniq = vals.size;
        if(uniq>=2 && uniq<=Math.min(15, rows.length)){ // rango visible
          const card = Math.abs(8-uniq); // más cerca de 8 categorías
          if(bestCard === -1 || card < bestCard){ bestCard = card; bestIdx = j; }
        }
      }
      return bestIdx;
    }
    function aggCounts(aoa, dimIdx){
      const rows = aoa.slice(1);
      const map = new Map();
      for(const r of rows){
        const k = (r[dimIdx] ?? '').toString().trim() || '(vacío)';
        map.set(k, (map.get(k)||0)+1);
      }
      const labels = [...map.keys()];
      const values = labels.map(k => map.get(k));
      return { labels, values };
    }
    function updateKpiSummary(aoa){
      const rows = aoa.length ? aoa.length - 1 : 0;
      const cols = aoa[0]?.length || 0;
      const now  = new Date();
      const pad = n => String(n).padStart(2,'0');
      const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      const $rows = $('#kpiRows'), $cols = $('#kpiCols'), $upd = $('#kpiUpdated');
      if($rows) $rows.textContent = rows;
      if($cols) $cols.textContent = cols;
      if($upd)  $upd.textContent  = ts;

    async function ensureChartJs(){
      if(window.Chart) return;
      await new Promise((res, rej)=>{
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
        s.async = true;
        s.onload = res; s.onerror = ()=> rej(new Error('No se pudo cargar Chart.js'));
        document.head.appendChild(s);
      });
    }
    async function buildKPI(aoa, dimIdx){
      await ensureChartJs();
      const ctx = $('#kpiChart');
      if(!ctx) return;
      const { labels, values } = aggCounts(aoa, dimIdx);
      const colors = randomPalette(labels.length);
      if(kpiChartInstance) { try { kpiChartInstance.destroy(); } catch(e){} }
      kpiChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Conteo',
            data: values,
            backgroundColor: colors,
            borderColor: colors.map(c=>c),

/** Procesa CSV de Operatividad en el navegador:
 *  - Mantiene filas con H = DOMINION
 *  - Excluye M que contenga: traslado, reubicacion, pre-postulacion fm
 *  Nota: H=7 y M=12 (índices 0-based 7 y 12).
 */
async function processCSVOperatividad(fileObj, ui){
  const { setBar, setPct, setStage, sayOp } = ui;

  // 1) Leer y parsear
  const text = await fileObj.text();
  setStage('Parseando CSV…'); setBar(24); setPct(24);
  const rows = parseCSV(text,';');
  if(!rows.length){ sayOp('El CSV está vacío.'); return; }
  const headers = rows[0] || [];
  const out = [headers];

  // 2) Indices fijos por letra (H y M)
  const colH = 7;   // H -> índice 7 (0-based)
  const colM = 12;  // M -> índice 12

  // Seguridad si el CSV trae menos columnas
  if(headers.length <= Math.max(colH, colM)){
    throw new Error(`El archivo no tiene columnas suficientes. Esperaba al menos ${Math.max(colH, colM)+1}; tiene ${headers.length}.`);
  }

  // 3) Filtrar
  setStage('Filtrando…'); setBar(40); setPct(40);
  const ban = ['traslado','reubicacion','pre-postulacion fm'];
  const total = rows.length-1;
  const chunk = Math.max(50, Math.floor(total/60));
  for(let i=1; i<rows.length; i++){
    const r = rows[i]; if(!r) continue;
    const h = normTxt(r[colH]);
    const m = normTxt(r[colM]);
    const isDominion = (h === 'dominion');
    const banned = ban.some(t => m.includes(t));
    if(isDominion && !banned){ out.push(r); }
    if(i%chunk===0 || i===total){
      const p = 40 + Math.min(58, Math.round(i/total*58));
      setBar(p); setPct(p);
      await new Promise(rr => setTimeout(rr,0));
    }
  }

  // 4) Generar salida
  setStage('Generando archivo…'); setBar(99); setPct(99);
  resultAOA = out;
  outText   = toCSV(out,';');

  // 5) Fin
  setBar(100); setPct(100); setStage('Listo');
  sayOp(`Filas filtradas: ${out.length-1}.`);
  log('Operatividad: procesamiento finalizado.');
}

    const STOP = new Set('de la los las del y o u para con por en el al un una que como cual cuales qué mas más a se si no es son soy esta este están está estan'.split(' '));
    const norm = s => s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^\w\s]/g,' ')
      .replace(/\s+/g,' ')
      .trim();
    const toks = s => norm(s).split(' ').filter(t => t && !STOP.has(t));
    const toVec = arr => { const m = new Map(); arr.forEach(t=> m.set(t, (m.get(t)||0)+1)); return m; };
    const dot = (a,b) => { let s=0; for(const [k,v] of a) if(b.has(k)) s += v*b.get(k); return s; };
    const mag = a => Math.sqrt([...a.values()].reduce((s,v)=>s+v*v,0));
    const cosine = (A,B)=>{ const d = dot(A,B); const m = mag(A)*mag(B); return m? d/m : 0; };
    const jacc = (A,B)=>{ const a = new Set(A), b = new Set(B); const inter = [...a].filter(x=>b.has(x)).length; const uni = new Set([...a, ...b]).size; return uni? inter/uni : 0; };
    const KBV = KB.map(item=>{
      const allQ = item.q.join(' ');
      const tk = toks(allQ);
      return { item, tk, v: toVec(tk) };
    });
    function bestMatch(q){
      const tq = toks(q); const vq = toVec(tq);
      let best = {score:0, item:null};
      KBV.forEach(({item, tk, v})=>{
        const s = 0.7*cosine(vq, v) + 0.3*jacc(tq, tk);
        if(s > best.score) best = {score:s, item};
      });
      return best;
    }

    function pushMsg(role, text){
      const wrap = document.createElement('div'); wrap.className = `msg ${role}`;
      const bubble = document.createElement('div'); bubble.className = 'b';
      wrap.appendChild(bubble); msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
      if(role !== 'bot'){ bubble.textContent = text; return; }
      const FULL = (text || '').toString(); const SPEED = 18; const CHUNK = 1; let i = 0;
      bubble.textContent = ''; bubble.classList.add('typing-caret');
      const timer = setInterval(()=>{
        const next = FULL.slice(i, i + CHUNK);
        bubble.textContent += next; i += CHUNK; msgs.scrollTop = msgs.scrollHeight;
        if(i >= FULL.length){ clearInterval(timer); bubble.classList.remove('typing-caret'); bubble.textContent = FULL; }
      }, SPEED);
    }

    async function answer(q){
      if(!q) return;
      pushMsg('user', q);
      await new Promise(r => setTimeout(r, 180));
      const cmd = parseNLCommand(q);
      if (cmd){
        const msg = await runNLCommand(cmd);
        pushMsg('bot', msg || 'Listo.');
        return;
      }
      const {score, item} = bestMatch(q);
      const TH = 0.22;
      if(score >= TH && item){
        pushMsg('bot', item.a + (item.cmd ? ' (Estoy para ayudarte👍 )' : ''));
        try{ if(item.cmd) item.cmd(); }catch(e){}
      }else{
        pushMsg('bot', '¡Ups! Verifica el texto. Por ahora estoy habilitado para tareas específicas en este entorno. 🫶');
      }
    }

    btn.addEventListener('click', ()=>{ const q=(inp.value||'').trim(); inp.value=''; if(q) answer(q); });
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const q=(inp.value||'').trim(); inp.value=''; if(q) answer(q); } });

    if(sgBox){
      sgBox.addEventListener('click', e=>{
        const b = e.target.closest('button.sg'); if(!b) return;
        inp.value = b.dataset.q || ''; const q=(inp.value||'').trim(); inp.value=''; if(q) answer(q);
      });
    }
  })();
