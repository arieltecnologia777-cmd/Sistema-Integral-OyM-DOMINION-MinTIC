<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF‑8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Auditor</title>

  <!-- Fuente corporativa -->
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================================
   RESET + PALETA
========================================= */
:root {
  --azul-dom: #0e4aa8;
  --azul-dom-hover: #0c3f8f;
  --azul-ink: #0e2040;
  --bg-dashboard: #eef4ff;
  --line: #d7e0f5;
  --shadow-card: 0 8px 18px rgba(14,42,94,.12);
  --shadow-hover: 0 4px 10px rgba(14,74,168,.14);
  --radius: 14px;
  --font: "Segoe UI", system-ui, sans-serif;

  /* ✅ Variables necesarias para hover tipo Exclusiones */
  --row-hover-shadow: 0 10px 24px rgba(0,0,0,.10);
  --row-hover-lift: -1px;
  --row-radius: 12px;
}

body {
  font-family: var(--font);
  margin: 0;
  background: linear-gradient(180deg, #eef4ff, #fff);
  display: flex;
  min-height: 100vh;
}

* {
  box-sizing: border-box;
}

/* =========================================
   SIDEBAR
========================================= */
.sidebar {
  width: 260px;
  background: #fff;
  border-right: 1px solid var(--line);
  box-shadow: var(--shadow-card);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
}

.sb-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e8ecf7;
  box-shadow: 0 4px 12px rgba(14,42,94,.08);
}

.sb-brand-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--azul-ink);
}

.sb-brand-sub {
  font-size: 13px;
  color: #4a5260;
  font-weight: 500;
}

.sb-title {
  font-size: 12px;
  font-weight: 700;
  color: #203054;
  margin-top: 4px;
  padding-left: 4px;
}

.sb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  transition: background .18s, box-shadow .18s, border-color .18s, transform .14s;
}

.sb-item:hover {
  background: #eef4ff;
  border-color: #bfd6ff;
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}

.sb-item.active {
  background: #eaf2ff;
  border-color: var(--azul-dom);
}

.sb-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--azul-ink);
}

.sb-ico {
  width: 14px;
  height: 14px;
  border-radius: 999px;
}

.sb-ico-blue { background: #0e4aa8; }
.sb-ico-sky  { background: #0284c7; }
.sb-ico-amber { background: #f59e0b; }

.logout {
  margin-top: auto;
  border-color: #e4e9f6;
}

/* =========================================
   MAIN CONTENT
========================================= */
.main {
  margin-left: 260px;
  width: calc(100% - 260px);
  padding: 20px 28px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid #e1e6f3;
}

.header-title {
  font-size: 28px;
  font-weight: 900;
  color: var(--azul-ink);
  letter-spacing: -0.3px;
}

.search-box {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 6px 12px;
  gap: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}

.search-box input {
  border: none;
  outline: none;
  font-size: 14px;
  min-width: 240px;
}

/* =========================================
   TABLA + HOVER PRO TIPO EXCLUSIONES
========================================= */

.tabla-box {
  background: #fff;
  border: 1px solid rgba(199,215,243,.40);
  border-radius: 14px;
  box-shadow: 0 10px 24px rgba(0,0,0,.06);
  overflow: hidden;
  margin-top: 16px;
}

.tabla {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

thead th {
  background: #fff;
  color: var(--azul-ink);
  text-align: left;
  padding: 14px 16px;
  font-size: 14px;
  font-weight: 800;
  border-bottom: 1px solid var(--line);
}

tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  font-size: 14px;
  background: #fff;
}

/* ✅ Hover PRO tipo gestor_exclusiones */
.tabla tbody tr {
  transition: transform .16s ease, filter .16s ease;
}

.tabla tbody tr:hover {
  transform: translateY(var(--row-hover-lift));
  filter: drop-shadow(var(--row-hover-shadow));
}

.tabla tbody tr:hover td:first-child {
  border-top-left-radius: var(--row-radius);
  border-bottom-left-radius: var(--row-radius);
}

.tabla tbody tr:hover td:last-child {
  border-top-right-radius: var(--row-radius);
  border-bottom-right-radius: var(--row-radius);
}

/* =========================================
   MODAL (solo se llena con JS)
========================================= */
.modal {
  display: none;
}

  /* === Líneas divisoras EXACTAS como gestor_exclusiones === */
.tabla thead th {
  background: #ffffff;
  color: var(--azul-ink);
  text-align: center;
  padding: 14px 16px;
  font-size: 14px;
  font-weight: 800;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

.tabla thead th:last-child {
  border-right: none;
}

.tabla tbody td {
  padding: 14px 16px;
  font-size: 14px;
  background: #fff;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

.tabla tbody td:last-child {
  border-right: none;
}

  /* Botón tipo pill (estilo gestor_exclusiones) */
.btn-pill-auditor {
  appearance:none;
  display:inline-flex;
  align-items:center;
  gap:8px;
  height:32px;
  padding:0 14px;
  background:#fff;
  color:#0e4aa8;
  border:1px solid #cfe0ff;
  border-radius:12px;
  font-size:14px;
  cursor:pointer;
  transition: background .16s ease, color .16s ease, border-color .16s ease, transform .16s ease, box-shadow .16s ease;
}

.btn-pill-auditor:hover {
  background:#f3f7ff;
  color:#0e4aa8;
  border-color:#bfd6ff;
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(14,74,168,.18);
}

.btn-pill-auditor svg {
  stroke:#324a78;
  fill:none;
  stroke-width:1.8;
}

/* === ESTADOS DEL BOTÓN (estilo tipo Gestor_Exclusiones) === */
.btn-estado {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
  border:1px solid transparent;
  cursor:pointer;
  transition:0.18s;
}

/* Estado: Revisar (gris) */
.btn-gris {
  background:#eef3ff;
  color:#0e4aa8;
  border-color:#cfe0ff;
}
.btn-gris:hover {
  background:#e2ebff;
}

/* Estado: Continuar revisión (azul) */
.btn-azul {
  background:#0e4aa8;
  color:white;
}
.btn-azul:hover {
  background:#0c3f8f;
}

/* Estado: Aprobado (verde) */
.btn-verde {
  background:#16a34a;
  color:white;
}
.btn-verde svg {
  stroke:white !important;
}

/* Estado: Pendiente por técnico (rojo) */
.btn-rojo {
  background:#fee2e2;
  border-color:#fecaca;
  color:#b91c1c;
}
.btn-rojo:hover {
  background:#fecaca;
}

 /* === Estado RECHAZADO — rojo suave (menos agresivo) === */
.btn-estado.btn-rechazado {
  background: #fee2e2 !important;   /* rojo muy suave */
  color: #b91c1c !important;        /* rojo texto oscuro */
  border: 1px solid #fecaca !important;
  cursor: default;
}

.btn-estado.btn-rechazado svg {
  stroke: #b91c1c !important;
}

  /* === GALERÍA DE FOTOS - AJUSTES DE AUDITORÍA === */

.fotos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.foto-card {
  border: 1px solid #dce3f5;
  border-radius: 12px;
  overflow: hidden;
  background: #ffffff;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
  cursor: zoom-in;
  min-height: 260px;
}

.foto-card img {
  width: 100%;
  height: 240px;
  object-fit: contain;      /* ✅ NO recorta */
  background: #f4f6f8;
  transition: transform 0.15s ease;
}

/* =============================
   TABS ESTADO (VERSIÓN PRO)
============================= */
.tabs-estado {
  display: flex;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #d1d5db;
  background: #f9fafb;
  width: fit-content;
  margin-bottom: 12px;
}

.tabs-estado button {
  padding: 10px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-weight: 600;
  color: #374151;
  transition: all 0.2s ease;
  border-right: 1px solid #e5e7eb;
}

.tabs-estado button:last-child {
  border-right: none;
}

.tabs-estado button:hover {
  background: #f3f4f6;
}

/* Estado activo base */
.tabs-estado button.active {
  background: #136BFF;
  color: white;
}

/* 🔴 Rechazado */
.tabs-estado button[data-filtro="rechazado"].active {
  background: #ef4444;
}

/* 🟢 Aprobado */
.tabs-estado button[data-filtro="aprobado"].active {
  background: #16a34a;
}

/* 🟡 Pendiente */
.tabs-estado button[data-filtro="pendiente"].active {
  background: #f59e0b;
}

/* 🔵 Corregido */
.tabs-estado button[data-filtro="subsanado"].active {
  background: #3b82f6;
}

#exportarTablaBtn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(37,99,235,0.45);
}

#exportarTablaBtn:active {
  transform: translateY(0);
}

</style>
</head>

<body>

  <!-- ===================================================
       SIDEBAR PANEL AUDITOR
  =================================================== -->
  <aside class="sidebar">
    <div class="sb-brand">
      <img src="dominion_logo.png" width="40" alt="DOMINION">
      <div class="sb-brand-text">
        <div class="sb-brand-title">Panel Auditor</div>
        <div class="sb-brand-sub">Dominion</div>
      </div>
    </div>

    <div class="sb-title">NAVEGACIÓN</div>

    <button class="sb-item active" data-mod="inicio">
      <div class="sb-ico sb-ico-blue"></div>
      <div class="sb-label">Inicio</div>
    </button>

    <button class="sb-item" data-mod="mci">
      <div class="sb-ico sb-ico-sky"></div>
      <div class="sb-label">Auditor — MCI</div>
    </button>

    <button class="sb-item" data-mod="mpr">
      <div class="sb-ico sb-ico-amber"></div>
      <div class="sb-label">Auditor — MPR</div>
    </button>

    <button class="sb-item logout">
      <div class="sb-ico sb-ico-blue"></div>
      <div class="sb-label">Cerrar sesión</div>
    </button>
  </aside>

  <!-- ===================================================
       MAIN CONTENT
  =================================================== -->
  <main class="main">

    <div class="header-top">
      <div class="header-title">Panel Auditor</div>

      
    </div>

    <!-- Contenedor dinámico del módulo -->
    <div id="contenedor-modulo"></div>

  </main>

  <!-- ===================================================
       MODAL FULLSCREEN — VISOR DE INFORMES
  =================================================== -->
  <div id="modalVisor" style="
      display:none;
      position:fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      z-index: 9999;
      padding: 40px;
      overflow: auto;
  ">
    <div style="
      background:#fff;
      width:100%;
      max-width:1200px;
      margin:0 auto;
      border-radius:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
    ">

      <!-- Barra superior -->
      <div style="display:flex; justify-content:space-between; align-items:center;">
  <button id="visorVolver" style="
    background:#e2e8f8;
    border:none;
    padding:8px 16px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
  ">⬅ Volver</button>

  <div style="display:flex; gap:10px;">
    <button id="visorAbrirExcel" style="
      background:#2563eb;
      color:white;
      border:none;
      padding:8px 16px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    ">
      📊 Abrir Excel en línea
    </button>

    <button id="visorDescargar" style="
      background:#0e4aa8; color:#fff;
      border:none; padding:8px 16px;
      border-radius:10px; cursor:pointer;
      font-weight:700;
    ">Descargar</button>

   <button
  id="visorAprobar"
  disabled
  style="
    background:#16a34a;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:10px;
    cursor:not-allowed;
    font-weight:700;
    opacity:0.4;
  "
>
  Aprobar
</button>

    <button
  id="visorRechazar"
  disabled
  style="
    background:#dc2626;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:10px;
    cursor:not-allowed;
    font-weight:700;
    opacity:0.4;
  "
>
  Rechazar
</button>
  </div>
</div>

      <!-- Contenedor del Excel (Preview) -->
      <div id="visorIframe" style="
        width:100%;
        max-height:60vh;
        overflow-y:auto;
        border:1px solid #dce3f5;
        border-radius:12px;
        background:#f8faff;
        padding:20px;
        margin-bottom:20px;
      ">
      </div>

    </div>
  </div>

  <!-- Scripts obligatorios -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Scripts principales del Auditor -->
  <script type="module" src="./modulos_v2.js"></script>
  <script type="module" src="./graph_v2.js"></script>
  <script type="module" src="./app_v2.js"></script>

</body>
</html>
