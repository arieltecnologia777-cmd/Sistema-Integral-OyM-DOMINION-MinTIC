<script>
document.addEventListener('DOMContentLoaded', () => {
/* =============== CONFIG BACKEND (Cloudflare Workers) — multi-módulo =============== */
const API_BASE = 'https://exclusiones-worker.modulo-de-exclusiones.workers.dev';
const BACKENDS = {
  operatividad: `${API_BASE}/p1`,
  backlog: `${API_BASE}/p2`,
  sla: `${API_BASE}/p3`
};

/* === Detección robusta del módulo ===
   Prioridad:
   1) querystring ?m=operatividad|backlog|sla
   2) sessionStorage.ex_mod (lo setea el admin)
   3) 'operatividad' (fallback) */
function detectModule(){
  const q = new URLSearchParams(location.search).get('m');
  const qs = (q||'').trim().toLowerCase();
  if (qs === 'operatividad' || qs === 'backlog' || qs === 'sla') return qs;
  try{
    const s = (sessionStorage.getItem('ex_mod')||'').trim().toLowerCase();
    if (s === 'operatividad' || s === 'backlog' || s === 'sla') return s;
  }catch{}
  return 'operatividad';
}
let CURRENT_MODULE = detectModule();
let API = (BACKENDS[CURRENT_MODULE] || BACKENDS.operatividad).replace(/\/+$/,'');

/* Helper para actualizar el módulo “on the fly”, si hiciera falta */
function setModule(mod){
  if (!mod) return;
  const m = String(mod).toLowerCase();
  if (!BACKENDS[m]) return;
  CURRENT_MODULE = m;
  API = BACKENDS[m].replace(/\/+$/,'');
}

/* =============== Helpers UI mínimos (si ya los tienes, deja los tuyos) =============== */
const $ = s => document.querySelector(s);

/* =============== Wrapper de fetch centralizado =============== */
async function fetchAPI(path, opts = {}){
  const url = `${API}${path.startsWith('/') ? path : '/'+path}`;
  const res = await fetch(url, { mode:'cors', ...opts });
  let json = null;
  try { json = await res.clone().json(); } catch {}
  if (!res.ok || (json && json.ok === false)) {
    const msg = json?.error || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return json ?? {};
}

    const res = await fetchAPI('/api/guardarOT', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify(payload)
    });
    // res.ok === true
    // refrescar si corresponde:
    await cargarDatos();
  }catch(err){
    console.error('Error guardarGestion:', err);
  }
}
